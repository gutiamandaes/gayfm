<div class="animate__animated animate__fadeIn">
    <header class="text-center mb-8">
        <h1 class="text-5xl rainbow-text italic tracking-tighter mb-2">HISTÓRICO</h1>
        <p class="text-gray-500 uppercase text-[10px] tracking-[0.3em]">Últimas músicas tocadas</p>
    </header>

    <div class="bg-[#0a0a0a] border border-zinc-900 p-6 rounded-3xl mb-8 border-l-4 border-l-red-600">
        <p class="text-red-500 text-[10px] font-black tracking-widest mb-3 uppercase">Tocando Agora</p>
        <div id="now-playing-page" class="flex items-center gap-4 text-left">
            <img id="current-art-page" src="favicon.png" class="w-16 h-16 rounded-xl shadow-lg">
            <div>
                <h2 id="current-title-page" class="text-xl font-bold leading-tight">Carregando...</h2>
                <p id="current-artist-page" class="text-gray-400 text-sm">Aguarde...</p>
            </div>
        </div>
    </div>

    <div id="history-list" class="bg-[#0a0a0a] border border-zinc-900 p-6 rounded-3xl space-y-4">
        </div>
</div>

<script>
    // Função interna da página de músicas
    function updateMusicasPage() {
        fetch("https://gayfmbr.mooo.com/api/nowplaying/gay_fm_br")
            .then(res => res.json())
            .then(data => {
                // Atualiza o destaque
                document.getElementById('current-title-page').innerText = data.now_playing.song.title;
                document.getElementById('current-artist-page').innerText = data.now_playing.song.artist;
                document.getElementById('current-art-page').src = data.now_playing.song.art;

                // Atualiza o histórico
                let html = "";
                data.song_history.forEach(item => {
                    html += `
                        <div class="flex items-center gap-4 py-2 border-b border-zinc-900 last:border-0 text-left">
                            <img src="${item.song.art}" class="w-10 h-10 rounded-md">
                            <div>
                                <p class="text-white font-bold text-sm">${item.song.title}</p>
                                <p class="text-gray-500 text-xs">${item.song.artist}</p>
                            </div>
                        </div>`;
                });
                document.getElementById('history-list').innerHTML = html;
            });
    }
    updateMusicasPage();
</script>
