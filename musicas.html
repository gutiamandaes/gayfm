<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Últimas músicas - GAY FM BR</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #ffffff;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #ff1493;
}

.lista {
    max-width: 600px;
    margin: auto;
}

.musica {
    background: #f5f5f5;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
}

.titulo {
    font-weight: bold;
    color: #333;
}

.artista {
    color: #666;
    font-size: 14px;
}

</style>
</head>

<body>

<h1>🎧 Últimas músicas tocadas</h1>

<div class="lista" id="listaMusicas">
    Carregando músicas...
</div>

<script>
async function carregarMusicas() {
    try {
        const response = await fetch("https://gayfmbr.mooo.com/api/nowplaying/gay_fm_br");
        const data = await response.json();

        const lista = document.getElementById("listaMusicas");
        lista.innerHTML = "";

        data.song_history.forEach(musica => {
            const div = document.createElement("div");
            div.className = "musica";

            div.innerHTML = `
                <div class="titulo">${musica.song.title}</div>
                <div class="artista">${musica.song.artist}</div>
            `;

            lista.appendChild(div);
        });

    } catch (erro) {
        document.getElementById("listaMusicas").innerHTML = "Erro ao carregar músicas 😢";
    }
}

// carregar ao abrir
carregarMusicas();

// atualizar a cada 20 segundos
setInterval(carregarMusicas, 20000);
</script>

</body>
</html>
