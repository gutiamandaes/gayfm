<style>
    /* Mantendo o padrão de linha que corta a tela (Full Width) */
    .full-rainbow-line {
        background: linear-gradient(90deg, #E40303, #FF8C00, #FFED00, #008026, #24408E, #732982);
        height: 4px;
        width: 100vw;
        position: relative;
        left: 50%;
        right: 50%;
        margin-left: -50vw;
        margin-right: -50vw;
    }
</style>

<div class="animate__animated animate__fadeIn">
    
    <div class="full-rainbow-line mb-6"></div>

    <div class="flex justify-end mb-8">
        <span onclick="carregarPagina('home.html')" class="text-[10px] tracking-widest font-black text-gray-500 hover:text-white uppercase cursor-pointer transition-all">
            ← VOLTAR
        </span>
    </div>

    <header class="text-center mb-10">
        <h1 class="text-5xl rainbow-text italic tracking-tighter mb-2 font-black">HISTÓRICO</h1>
        <p class="text-gray-500 uppercase text-[10px] tracking-[0.3em]">Últimas músicas tocadas</p>
    </header>

    <div class="bg-[#0a0a0a] border border-zinc-900 p-6 rounded-3xl mb-8 border-l-4 border-l-red-600 shadow-xl">
        <p class="text-red-500 text-[10px] font-black tracking-widest mb-3 uppercase flex items-center gap-2">
            <span class="relative flex h-2 w-2">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
            </span>
            Tocando Agora
        </p>
        <div class="flex items-center gap-4 text-left">
            <img id="current-art-page" src="favicon.png" class="w-16 h-16 rounded-xl shadow-lg border border-zinc-800 object-cover">
            <div class="overflow-hidden">
                <h2 id="current-title-page" class="text-xl font-bold leading-tight truncate text-white uppercase tracking-tighter">Sintonizando...</h2>
                <p id="current-artist-page" class="text-gray-400 text-sm truncate uppercase">Gay FM Brasil</p>
            </div>
        </div>
    </div>

    <div class="bg-[#0a0a0a] border border-zinc-900 rounded-3xl overflow-hidden shadow-2xl mb-8">
        <div class="p-4 border-b border-zinc-900 text-center bg-[#0d0d0d]">
            <p class="text-[10px] text-gray-500 font-black uppercase tracking-widest">Histórico do Estúdio</p>
        </div>
        <iframe src="https://gayfmbr.mooo.com/public/gay_fm_br/history" 
                frameborder="0" 
                allowtransparency="true" 
                style="width: 100%; min-height: 500px; height: 500px; border: 0;">
        </iframe>
    </div>
</div>

<script>
    // Sincronização inteligente com o player global (index.html)
    function sincronizarComPlayer() {
        const tituloPrincipal = document.getElementById('song-title');
        const artistaPrincipal = document.getElementById('song-artist');
        const artPrincipal = document.getElementById('song-art');
        
        const tituloPagina = document.getElementById('current-title-page');
        const artistaPagina = document.getElementById('current-artist-page');
        const artPagina = document.getElementById('current-art-page');

        if (tituloPrincipal && tituloPagina) {
            tituloPagina.innerText = tituloPrincipal.innerText;
            artistaPagina.innerText = artistaPrincipal.innerText;
            
            if(artPagina && artPrincipal) {
                artPagina.src = artPrincipal.src;
            }
        }
    }

    sincronizarComPlayer();
    
    // Gestão de memória para o timer
    if(window.timerSinc) clearInterval(window.timerSinc);
    window.timerSinc = setInterval(sincronizarComPlayer, 2000);
</script>
