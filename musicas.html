<div class="animate__animated animate__fadeIn">
    <div class="flex justify-end mb-4">
        <span onclick="carregarPagina('home.html')" class="text-[10px] tracking-widest font-black text-gray-500 hover:text-white uppercase cursor-pointer transition-all">
            ← VOLTAR
        </span>
    </div>

    <header class="text-center mb-8">
        <h1 class="text-5xl rainbow-text italic tracking-tighter mb-2">HISTÓRICO</h1>
        <p class="text-gray-500 uppercase text-[10px] tracking-[0.3em]">Últimas músicas tocadas</p>
    </header>

    <div class="bg-[#0a0a0a] border border-zinc-900 p-6 rounded-3xl mb-8 border-l-4 border-l-red-600">
        <p class="text-red-500 text-[10px] font-black tracking-widest mb-3 uppercase">Tocando Agora</p>
        <div id="now-playing-page" class="flex items-center gap-4 text-left">
            <img id="current-art-page" src="favicon.png" class="w-16 h-16 rounded-xl shadow-lg border border-zinc-800">
            <div class="overflow-hidden">
                <h2 id="current-title-page" class="text-xl font-bold leading-tight truncate text-white uppercase">Sintonizando...</h2>
                <p id="current-artist-page" class="text-gray-400 text-sm truncate">Gay FM Brasil</p>
            </div>
        </div>
    </div>

    <div class="bg-[#0a0a0a] border border-zinc-900 rounded-3xl overflow-hidden shadow-2xl mb-8">
        <div class="p-4 border-b border-zinc-900 text-center bg-[#0d0d0d]">
            <p class="text-[10px] text-gray-500 font-black uppercase tracking-widest">Histórico do Estúdio</p>
        </div>
        <iframe src="https://gayfmbr.mooo.com/public/gay_fm_br/history" 
                frameborder="0" 
                allowtransparency="true" 
                style="width: 100%; min-height: 500px; height: 500px; border: 0;">
        </iframe>
    </div>
</div>

<script>
    (function() {
        const apiLink = "https://gayfmbr.mooo.com/api/nowplaying/gay_fm_br";

        function updateNowPlaying() {
            fetch(apiLink)
                .then(res => res.json())
                .then(data => {
                    const song = data.now_playing.song;
                    
                    // Atualiza Título
                    const titleEl = document.getElementById('current-title-page');
                    if(titleEl) titleEl.innerText = song.title;

                    // Atualiza Artista
                    const artistEl = document.getElementById('current-artist-page');
                    if(artistEl) artistEl.innerText = song.artist;

                    // Atualiza Capa
                    const artEl = document.getElementById('current-art-page');
                    if(artEl) artEl.src = song.art;
                    
                    console.log("Atualizado: " + song.title);
                })
                .catch(err => {
                    console.error("Erro ao buscar rádio:", err);
                    document.getElementById('current-title-page').innerText = "Gay FM Brasil";
                });
        }

        // Inicia imediatamente
        updateNowPlaying();
        
        // Atualiza a cada 10 segundos (mais rápido que o anterior)
        if (window.radioTimer) clearInterval(window.radioTimer);
        window.radioTimer = setInterval(updateNowPlaying, 10000);
    })();
</script>
