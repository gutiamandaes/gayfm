<div class="animate__animated animate__fadeIn">
    <div class="flex justify-end mb-4">
        <span onclick="carregarPagina('home.html')" class="text-[10px] tracking-widest font-black text-gray-500 hover:text-white uppercase cursor-pointer transition-all">
            ← VOLTAR
        </span>
    </div>

    <header class="text-center mb-8">
        <h1 class="text-5xl rainbow-text italic tracking-tighter mb-2">HISTÓRICO</h1>
        <p class="text-gray-500 uppercase text-[10px] tracking-[0.3em]">Últimas músicas tocadas</p>
    </header>

    <div class="bg-[#0a0a0a] border border-zinc-900 p-6 rounded-3xl mb-8 border-l-4 border-l-red-600">
        <p class="text-red-500 text-[10px] font-black tracking-widest mb-3 uppercase">Tocando Agora</p>
        <div id="now-playing-page" class="flex items-center gap-4 text-left">
            <img id="current-art-page" src="favicon.png" class="w-16 h-16 rounded-xl shadow-lg">
            <div>
                <h2 id="current-title-page" class="text-xl font-bold leading-tight">Carregando...</h2>
                <p id="current-artist-page" class="text-gray-400 text-sm">Aguarde...</p>
            </div>
        </div>
    </div>

    <div id="history-list" class="bg-[#0a0a0a] border border-zinc-900 p-6 rounded-3xl space-y-4 mb-8">
        <p class="text-center text-gray-600 text-xs animate-pulse">SINCRONIZANDO HISTÓRICO...</p>
    </div>

    <div class="bg-[#0a0a0a] border border-zinc-900 rounded-3xl overflow-hidden shadow-2xl mb-8">
        <div class="p-4 border-b border-zinc-900">
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest text-center">Relatório do Servidor</p>
        </div>
        <iframe src="https://gayfmbr.mooo.com/public/gay_fm_br/history" 
                frameborder="0" 
                allowtransparency="true" 
                style="width: 100%; min-height: 400px; height: 400px; border: 0;">
        </iframe>
    </div>
</div>

<script>
    (function() {
        console.log("Iniciando atualização do histórico...");
        
        function updateMusicasPage() {
            fetch("https://gayfmbr.mooo.com/api/nowplaying/gay_fm_br")
                .then(res => res.json())
                .then(data => {
                    const currentTitle = document.getElementById('current-title-page');
                    if(currentTitle) {
                        currentTitle.innerText = data.now_playing.song.title;
                        document.getElementById('current-artist-page').innerText = data.now_playing.song.artist;
                        document.getElementById('current-art-page').src = data.now_playing.song.art;
                    }

                    let html = "";
                    if (data.song_history) {
                        data.song_history.forEach(item => {
                            html += `
                                <div class="flex items-center gap-4 py-2 border-b border-zinc-900 last:border-0 text-left animate__animated animate__fadeIn">
                                    <img src="${item.song.art}" class="w-10 h-10 rounded-md shadow-sm">
                                    <div class="overflow-hidden">
                                        <p class="text-white font-bold text-sm truncate">${item.song.title}</p>
                                        <p class="text-gray-500 text-[10px] uppercase tracking-wider truncate">${item.song.artist}</p>
                                    </div>
                                </div>`;
                        });
                        const list = document.getElementById('history-list');
                        if(list) list.innerHTML = html;
                    }
                })
                .catch(err => {
                    console.error("Erro na API:", err);
                    const list = document.getElementById('history-list');
                    if(list) list.innerHTML = "<p class='text-red-900 text-center text-[10px]'>ERRO AO CONECTAR COM O SERVIDOR</p>";
                });
        }

        updateMusicasPage();
        
        if (window.historicoTimer) clearInterval(window.historicoTimer);
        window.historicoTimer = setInterval(updateMusicasPage, 15000);
    })();
</script>
