<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Músicas | Gay FM Brasil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000000; color: white; margin: 0; }
        
        .rainbow-text {
            background: linear-gradient(90deg, #E40303, #FF8C00, #FFED00, #008026, #24408E, #732982);
            background-size: 300% auto;
            animation: rainbowMove 6s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        @keyframes rainbowMove {
            0% { background-position: 0% center; }
            100% { background-position: 300% center; }
        }

        .glass-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 1.5rem;
        }

        /* Estilo da lista de músicas */
        .song-item {
            border-bottom: 1px solid #111;
            padding: 12px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .song-item:last-child { border: none; }
        
        .album-art {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
            background: #111;
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-6 flex justify-between items-center max-w-5xl mx-auto w-full">
        <a href="home.html"><img src="favicon.png" class="h-10 w-auto"></a>
        <a href="home.html" class="text-[10px] tracking-widest font-black text-gray-500 hover:text-white uppercase">VOLTAR</a>
    </nav>

    <main class="max-w-2xl mx-auto px-6 py-10">
        
        <header class="text-center mb-12">
            <h1 class="text-5xl rainbow-text italic tracking-tighter mb-2">HISTÓRICO</h1>
            <p class="text-gray-500 uppercase text-[10px] tracking-[0.3em]">Últimas músicas tocadas</p>
        </header>

        <div class="glass-card p-6 mb-8 border-l-4 border-l-red-600">
            <p class="text-red-500 text-[10px] font-black tracking-widest mb-3 uppercase">Tocando Agora</p>
            <div id="now-playing" class="flex items-center gap-4">
                <img id="current-art" src="favicon.png" class="w-16 h-16 rounded-xl shadow-lg">
                <div>
                    <h2 id="current-title" class="text-xl font-bold leading-tight">Carregando...</h2>
                    <p id="current-artist" class="text-gray-400">Aguarde um instante</p>
                </div>
            </div>
        </div>

        <div class="glass-card p-6">
            <div id="history-list">
                <p class="text-gray-600 text-center py-4">Sincronizando com o servidor...</p>
            </div>
        </div>

    </main>

    <script>
        const api_url = "https://gayfmbr.mooo.com/api/nowplaying/gay_fm_br";

        async function updateSongs() {
            try {
                const response = await fetch(api_url);
                const data = await response.json();

                // 1. Atualiza "Tocando Agora"
                document.getElementById('current-title').innerText = data.now_playing.song.title;
                document.getElementById('current-artist').innerText = data.now_playing.song.artist;
                document.getElementById('current-art').src = data.now_playing.song.art;

                // 2. Atualiza Histórico
                let historyHTML = "";
                data.song_history.forEach(item => {
                    historyHTML += `
                        <div class="song-item">
                            <img src="${item.song.art}" class="album-art">
                            <div>
                                <p class="text-white font-bold text-sm leading-tight">${item.song.title}</p>
                                <p class="text-gray-500 text-xs">${item.song.artist}</p>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('history-list').innerHTML = historyHTML;

            } catch (error) {
                console.error("Erro ao carregar músicas:", error);
            }
        }

        // Atualiza ao carregar e depois a cada 15 segundos
        updateSongs();
        setInterval(updateSongs, 15000);
    </script>

    <footer class="p-12 text-center text-gray-700 text-[10px] uppercase tracking-[0.2em] mb-32">
        <span class="rainbow-text text-sm mb-2 block font-black uppercase">Gay FM Brasil</span>
        WWW.GAYFM.COM.BR
    </footer>

</body>
</html>
