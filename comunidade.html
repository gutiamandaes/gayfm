<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidade | Gay FM Brasil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000000; color: white; margin: 0; overflow-x: hidden; }
        
        /* O PADRÃO GAY FM - LINHA TOTAL */
        .full-rainbow-line {
            background: linear-gradient(90deg, #E40303, #FF8C00, #FFED00, #008026, #24408E, #732982);
            height: 4px;
            width: 100vw;
            position: relative;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
        }

        .rainbow-text {
            background: linear-gradient(90deg, #E40303, #FF8C00, #FFED00, #008026, #24408E, #732982);
            background-size: 300% auto;
            animation: rainbowMove 6s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        @keyframes rainbowMove {
            0% { background-position: 0% center; }
            100% { background-position: 300% center; }
        }

        .glass-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transition: all 0.3s ease;
        }
        
        .news-container {
            height: 250px;
            overflow: hidden;
            position: relative;
        }

        .news-scroll {
            display: flex;
            flex-direction: column;
            animation: scrollUp 20s linear infinite;
        }

        .news-scroll:hover {
            animation-play-state: paused;
        }

        @keyframes scrollUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        .news-item {
            padding: 15px;
            border-bottom: 1px solid #1a1a1a;
            text-align: left;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <div class="full-rainbow-line"></div>

    <nav class="p-6 flex justify-between items-center max-w-5xl mx-auto w-full">
        <a href="home.html">
            <img src="favicon.png" alt="Gay FM Logo" class="h-8 w-auto object-contain">
        </a>
        <div class="space-x-4">
            <a href="home.html" class="text-[10px] tracking-widest font-black text-gray-500 hover:text-white transition uppercase">VOLTAR</a>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center px-6 text-center py-6 animate__animated animate__fadeIn">
        
        <div class="mb-12">
            <h1 class="text-4xl md:text-5xl rainbow-text italic tracking-tighter mb-2 uppercase font-black">
                Nossa Tribo
            </h1>
            <p class="text-gray-500 text-[10px] tracking-[0.3em] uppercase">Conectando o orgulho</p>
        </div>

        <div class="w-full max-w-sm glass-card rounded-[2rem] p-6 mb-6 hover:border-blue-500 transition-all">
            <div class="flex items-center space-x-4">
                <div class="bg-[#0088cc]/10 p-3 rounded-full">
                    <svg class="w-10 h-10 text-[#0088cc]" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 0c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm5.891 8.146l-1.92 9.03c-.145.64-.52.795-1.056.492l-2.924-2.154-1.411 1.358c-.156.156-.287.287-.588.287l.21-2.978 5.42-4.897c.235-.21-.051-.326-.364-.118l-6.699 4.22-2.887-.903c-.628-.196-.64-.628.131-.928l11.279-4.346c.523-.19.981.123.799.935z"/>
                    </svg>
                </div>
                <div class="text-left flex-grow">
                    <h2 class="text-lg font-black uppercase tracking-tight">Telegram</h2>
                    <p class="text-gray-500 text-xs uppercase">@gayfmbr</p>
                </div>
                <a href="https://t.me/gayfmbr" target="_blank" 
                   class="bg-[#0088cc] text-white px-4 py-2 rounded-xl font-bold text-xs hover:scale-105 transition-all uppercase">
                   Entrar
                </a>
            </div>
        </div>

        <div class="w-full max-w-sm glass-card rounded-[2rem] overflow-hidden flex flex-col mb-12">
            <div class="p-4 bg-zinc-900/50 border-b border-zinc-800 text-left flex items-center justify-between">
                <span class="text-[10px] font-black tracking-widest uppercase rainbow-text">Notícias Blog</span>
                <span class="bg-red-600 h-2 w-2 rounded-full animate-pulse"></span>
            </div>
            
            <div class="news-container" id="newsContainer">
                <div class="news-scroll" id="newsList">
                    <div class="news-item"><p class="text-gray-500 text-xs italic uppercase">Sintonizando informações...</p></div>
                </div>
            </div>
        </div>

        <button onclick="location.href='home.html'" 
                class="bg-zinc-900 text-gray-500 px-8 py-3 rounded-full font-bold hover:bg-zinc-800 hover:text-white transition-all text-[9px] uppercase tracking-[0.3em] border border-zinc-800">
            ← Voltar para a Home
        </button>

    </main>

    <footer class="p-8 text-center text-gray-700 text-[9px] uppercase tracking-[0.2em]">
        <span class="rainbow-text text-lg mb-1 block font-black uppercase italic">Gay FM Brasil</span>
        WWW.GAYFM.COM.BR &bull; 2026
    </footer>

    <script>
        async function loadNews() {
            const RSS_URL = `https://gayfm7.wordpress.com/feed/`; 
            const API_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`;

            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const newsList = document.getElementById('newsList');
                
                if (data.status === 'ok') {
                    let html = '';
                    data.items.forEach(item => {
                        html += `
                            <div class="news-item">
                                <a href="${item.link}" target="_blank" class="block group">
                                    <h3 class="text-sm font-bold text-white group-hover:text-red-500 transition-colors uppercase leading-tight">${item.title}</h3>
                                    <span class="text-[9px] text-gray-400 uppercase mt-1 block">${new Date(item.pubDate).toLocaleDateString()}</span>
                                </a>
                            </div>
                        `;
                    });
                    newsList.innerHTML = html + html; 
                }
            } catch (error) {
                console.error('Erro ao carregar notícias:', error);
            }
        }
        loadNews();
    </script>

</body>
</html>
