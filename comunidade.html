<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidade | Gay FM Brasil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: white; color: black; }
        
        .rainbow-line {
            background: linear-gradient(90deg, #ff0000, #ff8c00, #ffff00, #008000, #0000ff, #4b0082, #ee82ee);
            height: 6px;
        }

        /* Cores individuais para as letras do título */
        .letra-r { color: #ff0000; } .letra-o { color: #ff8c00; } 
        .letra-y { color: #ffdf00; } .letra-g { color: #008000; } 
        .letra-b { color: #0000ff; } .letra-v { color: #4b0082; } 
        .letra-p { color: #ee82ee; }

        .glass-card {
            background: white;
            border: 1px solid #e5e7eb;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }
        .glass-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div class="rainbow-line"></div>

    <nav class="p-6 flex justify-between items-center max-w-5xl mx-auto w-full">
        <a href="home.html">
            <img src="favicon.png" alt="Gay FM Logo" class="h-12 w-auto object-contain">
        </a>
        <div class="space-x-4">
            <a href="home.html" class="text-sm font-bold text-gray-500 hover:text-black">INÍCIO</a>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center px-6 text-center py-10">
        
        <div class="mb-12">
            <h1 class="text-6xl font-black mb-4 italic">
                <span class="letra-r">N</span><span class="letra-o">O</span><span class="letra-y">S</span><span class="letra-g">S</span><span class="letra-b">A</span> 
                <span class="letra-v">T</span><span class="letra-p">R</span><span class="letra-r">I</span><span class="letra-o">B</span><span class="letra-y">O</span>
            </h1>
            <p class="text-gray-500 text-lg max-w-md mx-auto">
                Conecte-se com ouvintes de todo o Brasil no Telegram.
            </p>
        </div>

        <div class="w-full max-w-md glass-card rounded-3xl p-10 mb-10">
            <div class="flex justify-center mb-6">
                <svg class="w-16 h-16 text-[#0088cc]" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 0c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm5.891 8.146l-1.92 9.03c-.145.64-.52.795-1.056.492l-2.924-2.154-1.411 1.358c-.156.156-.287.287-.588.287l.21-2.978 5.42-4.897c.235-.21-.051-.326-.364-.118l-6.699 4.22-2.887-.903c-.628-.196-.64-.628.131-.928l11.279-4.346c.523-.19.981.123.799.935z"/>
                </svg>
            </div>
            
            <h2 class="text-2xl font-bold mb-2">Grupo Oficial</h2>
            <p class="text-gray-400 text-sm mb-8 italic">t.me/gayfmbr</p>

            <a href="https://t.me/gayfmbr" target="_blank" 
               class="bg-[#0088cc] text-white block w-full py-4 rounded-2xl font-bold text-lg hover:brightness-110 transition-all">
                Entrar no Telegram
            </a>
        </div>

        <button onclick="location.href='home.html'" 
                class="bg-gray-100 text-gray-600 px-8 py-3 rounded-full font-bold hover:bg-gray-200 transition-all text-sm uppercase tracking-widest">
            ← Voltar para a Rádio
        </button>

    </main>

    <footer class="p-8 text-center text-gray-400 text-[10px] uppercase tracking-widest mb-28">
        Gay FM Brasil &bull; 2026
    </footer>

</body>
</html>
