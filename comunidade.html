<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidade | Gay FM Brasil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Fundo Preto e Texto Branco */
        body { font-family: 'Inter', sans-serif; background-color: #000000; color: white; margin: 0; }
        
        .rainbow-line {
            background: linear-gradient(90deg, #E40303, #FF8C00, #FFED00, #008026, #24408E, #732982);
            height: 4px;
        }

        /* Gradiente Animado para o Título */
        .rainbow-text {
            background: linear-gradient(90deg, #E40303, #FF8C00, #FFED00, #008026, #24408E, #732982);
            background-size: 300% auto;
            animation: rainbowMove 6s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        @keyframes rainbowMove {
            0% { background-position: 0% center; }
            100% { background-position: 300% center; }
        }

        /* Card em estilo Dark Glass */
        .glass-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transition: all 0.3s ease;
        }
        .glass-card:hover { 
            transform: translateY(-5px); 
            border-color: #E40303; 
            box-shadow: 0 10px 30px -10px rgba(228, 3, 3, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div class="rainbow-line"></div>

    <nav class="p-6 flex justify-between items-center max-w-5xl mx-auto w-full">
        <a href="home.html">
            <img src="favicon.png" alt="Gay FM Logo" class="h-10 w-auto object-contain">
        </a>
        <div class="space-x-4">
            <a href="index.html" class="text-[10px] tracking-widest font-black text-gray-500 hover:text-white transition uppercase">VOLTAR</a>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center px-6 text-center py-10">
        
        <div class="mb-12">
            <h1 class="text-5xl md:text-5xl rainbow-text italic tracking-tighter mb-4 whitespace-nowrap">
                NOSSA TRIBO
            </h1>
            <p class="text-gray-400 text-lg max-w-md mx-auto leading-relaxed">
                Conecte-se com ouvintes de todo o Brasil e participe da nossa comunidade no Telegram.
            </p>
        </div>

        <div class="w-full max-w-md glass-card rounded-[2.5rem] p-12 mb-10">
            <div class="flex justify-center mb-8">
                <svg class="w-20 h-20 text-[#0088cc] drop-shadow-[0_0_15px_rgba(0,136,204,0.3)]" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 0c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm5.891 8.146l-1.92 9.03c-.145.64-.52.795-1.056.492l-2.924-2.154-1.411 1.358c-.156.156-.287.287-.588.287l.21-2.978 5.42-4.897c.235-.21-.051-.326-.364-.118l-6.699 4.22-2.887-.903c-.628-.196-.64-.628.131-.928l11.279-4.346c.523-.19.981.123.799.935z"/>
                </svg>
            </div>
            
            <h2 class="text-2xl font-black mb-1 text-white uppercase tracking-tight">Grupo Oficial</h2>
            <p class="text-blue-500 text-sm mb-10 font-medium">t.me/gayfmbr</p>

            <a href="https://t.me/gayfmbr" target="_blank" 
               class="bg-[#0088cc] text-white block w-full py-5 rounded-2xl font-black text-xl hover:scale-105 transition-all shadow-xl shadow-blue-900/40 uppercase tracking-tight">
                Entrar no Telegram
            </a>
        </div>

        <button onclick="location.href='index.html'" 
                class="bg-zinc-900 text-gray-500 px-10 py-4 rounded-full font-bold hover:bg-zinc-800 hover:text-white transition-all text-[10px] uppercase tracking-[0.3em] border border-zinc-800">
            ← Voltar para a Início
        </button>

    </main>

    <footer class="p-12 text-center text-gray-700 text-[10px] uppercase tracking-[0.2em] mb-32">
        <span class="rainbow-text text-sm mb-2 block font-black uppercase">Gay FM Brasil</span>
        WWW.GAYFM.COM.BR &bull; 2026
    </footer>

</body>
</html>
