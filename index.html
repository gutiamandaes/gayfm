<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gay FM Brasil | Player Fixo</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: white; }
        
        /* Área das páginas (Home, Comunidade) */
        #conteudo-principal {
            width: 100%;
            height: calc(100% - 110px); /* Espaço para o player não cobrir nada */
            border: none;
        }

        /* Barra do Player no Rodapé */
        #barra-player {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 110px; /* Aumentamos um pouco para o botão Play aparecer bem */
            background: #ffffff;
            border-top: 2px solid #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
        }

        .rainbow-text {
            background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        /* Forçar o player de áudio a ter uma largura mínima visível */
        audio {
            width: 280px; 
            height: 45px;
        }
    </style>
</head>
<body>

    <iframe src="home.html" name="janela_site" id="conteudo-principal"></iframe>

    <div id="barra-player">
        <div class="max-w-4xl w-full px-6 flex flex-col md:flex-row items-center justify-between gap-2">
            
            <div class="flex items-center">
                <span class="animate-pulse mr-2 text-red-500">●</span>
                <p class="text-sm md:text-base rainbow-text uppercase tracking-tighter">
                    Ao Vivo: Gay FM Brasil
                </p>
            </div>

            <audio id="radioPlayer" controls>
                <source src="https://gayfmbr.mooo.com/radio/8000/radio.mp3" type="audio/mpeg">
                <source src="https://gayfmbr.mooo.com/listen/gay_fm_br/radio.mp3" type="audio/mpeg">
                Seu navegador não suporta áudio.
            </audio>

        </div>
    </div>

</body>
</html>
