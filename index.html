<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gay FM Brasil | No Ar</title>
    <meta name="description" content="Gay FM Brasil: A rádio vibrante da comunidade LGBTQIA+. Ouça os maiores hits em tempo real.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
    body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; margin:0; padding-bottom: 70px; }
    
    .rainbow-text {
        background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #00bfff, #0000ff, #8b00ff);
        background-size: 300% auto;
        animation: rainbowMove 6s linear infinite;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 900;
    }
    @keyframes rainbowMove { 0%{background-position:0% center} 100%{background-position:300% center}}

    .rainbow-flow {
        background: linear-gradient(270deg, #ff0000, #ff7f00, #ffff00, #00ff00, #00bfff, #0000ff, #8b00ff);
        background-size: 300% auto;
        animation: rainbowFlow 5s linear infinite;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: bold;
    }
    @keyframes rainbowFlow { 0%{background-position:300% center} 100%{background-position:0% center}}

    .nav-link {cursor:pointer; margin:0 10px; font-weight:bold;}
    .nav-link:hover {text-decoration:underline;}

    .fixed-player-horizontal {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 65px;
        background-color: #000;
        box-shadow: 0 -5px 25px rgba(228, 3, 3, 0.2);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 25px;
        border-top: 1px solid #111;
    }

    .equalizer-horizontal { display: flex; gap: 3px; height: 18px; align-items: flex-end; }
    .bar { width: 4px; height: 100%; border-radius: 1px; animation: barBounce 0.8s ease-in-out infinite; transform-origin: bottom; }
    
    /* Cores das Barras */
    .bar:nth-child(1) { background: #ff0000; animation-delay: -0.1s; }
    .bar:nth-child(2) { background: #ff7f00; animation-delay: -0.2s; }
    .bar:nth-child(3) { background: #ffff00; animation-delay: -0.3s; }
    .bar:nth-child(4) { background: #00ff00; animation-delay: -0.4s; }
    .bar:nth-child(5) { background: #00bfff; animation-delay: -0.5s; }
    .bar:nth-child(6) { background: #0000ff; animation-delay: -0.6s; }
    .bar:nth-child(7) { background: #8b00ff; animation-delay: -0.7s; }

    @keyframes barBounce { 0%, 100% { transform: scaleY(0.2); } 50% { transform: scaleY(1); } }
</style>
</head>
<body>

<div class="max-w-4xl mx-auto px-6 py-6 text-center">
    <h1 class="text-5xl rainbow-text italic mb-2">GAY FM BRASIL</h1>
    <div class="mt-4">
        <span class="nav-link" onclick="carregarPagina('home.html')">Home</span> |
        <span class="nav-link" onclick="carregarPagina('musicas.html')">Músicas</span> |
        <span class="nav-link" onclick="carregarPagina('comunidade.html')">Comunidade</span>
    </div>
</div>

<div id="conteudo" class="max-w-4xl mx-auto px-6 py-10 text-center">
    <p>Carregando conteúdo...</p>
</div>

<div class="fixed-player-horizontal">
    <div class="flex items-center">
        <span class="rainbow-flow text-sm font-black mr-4 uppercase">Ao Vivo</span>
    </div>

    <div class="equalizer-horizontal">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>

    <div class="flex-1 px-6 text-center overflow-hidden">
        <p id="song-title" class="text-white text-xs font-bold uppercase tracking-widest truncate">Buscando música...</p>
        <p id="song-artist" class="rainbow-text text-[10px] uppercase font-black truncate">Gay FM Brasil</p>
    </div>

    <div class="flex items-center">
        <audio id="audio-player" controls autoplay loop class="h-8 w-44 opacity-80 hover:opacity-100 transition-all">
            <source src="https://gayfmbr.mooo.com/listen/gay_fm_br/radio.mp3" type="audio/mpeg">
        </audio>
    </div>
</div>

<script>
    // Função para carregar páginas sem recarregar o site
    function carregarPagina(pagina) {
        fetch(pagina).then(res => res.text()).then(html => {
            document.getElementById("conteudo").innerHTML = html;
        }).catch(() => {
            document.getElementById("conteudo").innerHTML = "<p>Erro ao carregar.</p>";
        });
    }

    // FUNÇÃO QUE BUSCA A MÚSICA NO AZURACAST
    function atualizarMusica() {
        // A API pública do seu AzuraCast
        fetch('https://gayfmbr.mooo.com/api/nowplaying/gay_fm_br')
            .then(response => response.json())
            .then(data => {
                const musica = data.now_playing.song.title;
                const artista = data.now_playing.song.artist;
                
                document.getElementById('song-title').innerText = musica;
                document.getElementById('song-artist').innerText = artista;
            })
            .catch(err => {
                console.error('Erro ao buscar metadados:', err);
                document.getElementById('song-title').innerText = "GAY FM BRASIL";
            });
    }

    // Inicia as funções
    window.onload = function() {
        carregarPagina('home.html');
        atualizarMusica(); 
        setInterval(atualizarMusica, 15000); // Atualiza a cada 15 segundos
    };
</script>

</body>
</html>
