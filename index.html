<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gay FM Brasil | A Rádio que Brilha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .rainbow-gradient {
            background: linear-gradient(90deg, #ff0000, #ff8c00, #ffff00, #008000, #0000ff, #4b0082, #ee82ee);
            height: 6px;
            width: 100%;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col items-center">

    <div class="rainbow-gradient"></div>

    <main class="flex-grow flex flex-col items-center justify-center px-6 w-full max-w-4xl">
        
        <div class="text-center mb-10">
            <h1 class="text-5xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-yellow-500">
                GAY FM BRASIL
            </h1>
            <p class="text-zinc-400 text-lg">A rádio vibrante da comunidade LGBTQIA+</p>
        </div>

        <div class="w-full glass-card rounded-3xl overflow-hidden shadow-2xl">
            <iframe src="https://gayfmbr.mooo.com/public/gay_fm_brasil/embed" 
                    frameborder="0" 
                    allowtransparency="true" 
                    style="width: 100%; min-height: 150px; border: 0;">
            </iframe>
        </div>

        <div class="mt-10 flex gap-4">
            <a href="https://gayfmbr.mooo.com/public/gay_fm_brasil" target="_blank" 
               class="bg-white text-black px-8 py-3 rounded-full font-bold hover:bg-pink-500 hover:text-white transition-all">
                Página da Estação
            </a>
        </div>

    </main>

    <footer class="p-6 text-zinc-600 text-sm">
        &copy; 2026 Gay FM Brasil - Orgulho em sintonizar você.
    </footer>

</body>
</html>
