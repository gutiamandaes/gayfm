<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedir Música | Gay FM Brasil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000000; color: white; margin: 0; }
        
        .rainbow-text {
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #00bfff, #0000ff, #8b00ff);
            background-size: 300% auto;
            animation: rainbowMove 6s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        @keyframes rainbowMove { 0% { background-position: 0% center; } 100% { background-position: 300% center; } }

        input, textarea {
            background-color: #0a0a0a !important;
            border: 1px solid #333 !important;
            color: white !important;
        }

        input:focus, textarea:focus {
            border-color: #ff0000 !important;
            outline: none;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }

        .btn-voltar {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            z-index: 50;
        }
        .btn-voltar:hover { color: white; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen p-6 relative gap-10">

    <a href="index.html" class="btn-voltar">← Voltar para a Rádio</a>

    <div class="h-10"></div>

    <div class="w-full max-w-md bg-[#0a0a0a] p-10 rounded-[40px] shadow-2xl border border-gray-900 mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-4xl rainbow-text italic mb-3">PEDIR MÚSICA</h1>
            <p class="text-gray-500 text-sm font-medium">A Gay FM Brasil toca o que você ama!</p>
        </div>

        <form action="https://formspree.io/f/mnjgwwee" method="POST" class="space-y-6">
            <input type="hidden" name="_subject" value="🎵 Novo Pedido de Música!">
            <input type="hidden" name="_cc" value="gutiamanda@icloud.com">
            <input type="hidden" name="_replyto" value="contato@gayfm.com.br">

            <div>
                <label class="block text-[10px] uppercase tracking-[3px] text-gray-400 font-bold mb-3">Seu Nome</label>
                <input type="text" name="nome" placeholder="Como quer ser chamado?" required 
                    class="w-full px-5 py-4 rounded-2xl transition-all">
            </div>

            <div>
                <label class="block text-[10px] uppercase tracking-[3px] text-gray-400 font-bold mb-3">Seu E-mail</label>
                <input type="email" name="email" placeholder="Para a gente te avisar" required 
                    class="w-full px-5 py-4 rounded-2xl transition-all">
            </div>

            <div>
                <label class="block text-[10px] uppercase tracking-[3px] text-gray-400 font-bold mb-3">Qual música quer ouvir?</label>
                <textarea name="pedido" rows="3" placeholder="Ex: Dua Lipa - Houdini" required 
                    class="w-full px-5 py-4 rounded-2xl transition-all"></textarea>
            </div>

            <button type="submit" 
                class="w-full py-5 rounded-2xl bg-white text-black font-black uppercase tracking-tighter hover:scale-[1.03] active:scale-95 transition-all shadow-xl">
                Enviar para o Estúdio 🚀
            </button>
        </form>

        <footer class="mt-12 text-center">
            <p class="text-[9px] text-gray-700 uppercase tracking-[4px]">
                Gay FM Brasil &bull; 2026
            </p>
        </footer>
    </div>

    <div class="w-full max-w-4xl bg-[#0a0a0a] rounded-[40px] overflow-hidden border border-gray-900 shadow-2xl mb-12 mx-auto">
        <div class="p-6 text-center border-b border-gray-900">
            <h2 class="text-xl font-bold uppercase tracking-[2px]">Pedidos em Tempo Real</h2>
            <p class="text-[10px] text-gray-500 mt-2 uppercase">Peça direto no nosso banco de dados</p>
        </div>
        <iframe src="https://gayfmbr.mooo.com/public/gay_fm_br/embed-requests" 
                frameborder="0" 
                allowtransparency="true" 
                style="width: 100%; min-height: 850px; height: 850px; border: 0;">
        </iframe>
    </div>

</body>
</html>
